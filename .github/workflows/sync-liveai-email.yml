# Mirrors ./liveai-email/ to https://github.com/msimpson215/liveai-email on push.
# One-time setup: add repo secret LIVEAI_GITHUB_TOKEN (PAT with repo scope on liveai-email).
name: Sync to liveai-email

on:
  push:
    branches:
      - main
      - 'cursor/**'
    paths:
      - 'liveai-email/**'
      - '.github/workflows/sync-liveai-email.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push liveai-email subtree to msimpson215/liveai-email
        env:
          TOKEN: ${{ secrets.LIVEAI_GITHUB_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning::LIVEAI_GITHUB_TOKEN not set — skip sync. Add a PAT in repo Secrets to auto-deploy to liveai-email."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cd liveai-email
          git init
          git add -A
          git commit -m "Sync from a1-fence: ${GITHUB_SHA::7} — ${GITHUB_EVENT_HEAD_COMMIT_MESSAGE:-manual}" || true
          git branch -M main
          git remote add target "https://x-access-token:${TOKEN}@github.com/msimpson215/liveai-email.git"
          git push target main --force
