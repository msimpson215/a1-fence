<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axon AI</title>
  <script src="/assets/axon-email-orb.js"></script>
  <script>
    // Opens tiny transparent plate immediately — Gmail stays visible behind.
    (function () {
      var opened = AxonEmailOrb.openEmailOrb({ src: 'email' });
      if (!opened) {
        document.documentElement.style.background = '#f6f8fc';
        document.body.innerHTML =
          '<p style="font-family:Arial,sans-serif;text-align:center;padding:24px;color:#444;">' +
          'Allow popups for this site, then <a href="javascript:location.reload()">tap here</a> again.<br>' +
          'Gmail stays open behind the orb.</p>';
      }
    })();
  </script>
</head>
<body style="margin:0;background:transparent;"></body>
</html>
