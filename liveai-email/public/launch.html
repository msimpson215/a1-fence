<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A1 AI — Opening conversation</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #f6f8fc;
      color: #202124;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      max-width: 380px;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 12px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .card h1 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0 0 8px;
      line-height: 1.4;
    }
    .card p {
      font-size: 14px;
      line-height: 1.55;
      color: #5f6368;
      margin: 0 0 20px;
    }
    .orb-btn {
      width: 140px;
      height: 140px;
      margin: 0 auto 16px;
      border: none;
      border-radius: 50%;
      background: #FED100;
      box-shadow: 0 0 50px rgba(254, 209, 0, 0.7);
      cursor: pointer;
      animation: pulse 1.4s infinite alternate ease-in-out;
    }
    .orb-btn:active { transform: scale(0.97); }
    @keyframes pulse {
      from { box-shadow: 0 0 40px rgba(254, 209, 0, 0.55); }
      to   { box-shadow: 0 0 75px rgba(254, 209, 0, 1); }
    }
    .cta {
      display: inline-block;
      padding: 12px 20px;
      background: #FED100;
      color: #111;
      font-weight: 700;
      font-size: 13px;
      text-decoration: none;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      border: none;
      cursor: pointer;
    }
    .gmail-hint {
      margin-top: 16px;
      font-size: 12px;
      color: #80868b;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Open the conversation window</h1>
    <p>Your Gmail stays open in the other tab. A <strong>small window</strong> will open for the AI — not a full new page.</p>
    <button class="orb-btn" id="orb" type="button" aria-label="Open conversation window"></button>
    <button class="cta" id="openBtn" type="button">Open small window</button>
    <p class="gmail-hint">If nothing happens, allow popups for this site, then tap again.<br />Switch back to Gmail anytime.</p>
  </div>

  <script src="/assets/axon-email-orb.js"></script>
  <script>
    function handleOpen() {
      if (!AxonEmailOrb.openEmailOrb({ src: 'email' })) {
        alert('Please allow popups, then tap "Open small window" again.\n\nYour Gmail tab will stay open.');
      }
    }

    document.getElementById('orb').addEventListener('click', handleOpen);
    document.getElementById('openBtn').addEventListener('click', handleOpen);

    if (new URLSearchParams(window.location.search).get('autolaunch') === '1') {
      handleOpen();
    }
  </script>
</body>
</html>
