<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Axon AI</title>
  <style>
    :root { --yellow: #FED100; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
      user-select: none;
    }

    /* Full-page mode (direct visit, not popup) */
    body.full-page {
      background: radial-gradient(circle, #252525 0%, #000 100%);
    }

    #stage {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: transparent;
    }

    .close-plate {
      position: fixed;
      top: 4px;
      right: 4px;
      z-index: 10;
      width: 22px;
      height: 22px;
      border: none;
      border-radius: 50%;
      background: rgba(0,0,0,0.35);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 900;
      cursor: pointer;
      line-height: 1;
      opacity: 0.85;
    }

    .close-plate:hover { background: rgba(0,0,0,0.55); }

    #orb-container {
      width: 168px;
      height: 168px;
      cursor: pointer;
      line-height: 0;
      flex-shrink: 0;
    }

    #orb-container img {
      width: 168px;
      height: 168px;
      border-radius: 50%;
      display: block;
      box-shadow: 0 0 40px rgba(254, 209, 0, 0.75);
    }

    body.active #orb-container img {
      box-shadow: 0 0 70px rgba(254, 209, 0, 1);
    }

    .caption {
      max-width: 190px;
      text-align: center;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 1px 6px rgba(0,0,0,0.95), 0 0 12px rgba(0,0,0,0.8);
      line-height: 1.35;
      pointer-events: none;
    }

    .caption.hide { visibility: hidden; height: 0; margin: 0; overflow: hidden; }

    body.starting #orb-container { opacity: 0.9; pointer-events: none; }
  </style>
</head>
<body>
  <button type="button" class="close-plate" id="closeBtn" title="Close" aria-label="Close">✕</button>
  <div id="stage">
    <div id="orb-container" role="button" tabindex="0" aria-label="Talk with Axon AI">
      <img src="/email/orb-pulse.gif" width="168" height="168" alt="" />
    </div>
    <p class="caption" id="caption">Tap orb to talk</p>
  </div>

  <script>
    let pc = null
    let localStream = null
    let starting = false

    const urlParams = new URLSearchParams(window.location.search)
    const isEmailContext = urlParams.get('src') === 'email'
    const isPopup = urlParams.get('popup') === '1' || window.name === 'axon_plate'
    const sessionUrl = isEmailContext ? '/session?src=email' : '/session'

    const captionEl = document.getElementById('caption')
    const orbContainer = document.getElementById('orb-container')

    if (!isPopup) {
      document.body.classList.add('full-page')
      captionEl.textContent = isEmailContext
        ? 'Hello — AI team member with A1 Asphalt. Tap orb to talk.'
        : 'Tap orb to talk with our AI team member'
    }

    function setIdle() {
      document.body.className = isPopup ? '' : 'full-page'
      captionEl.classList.remove('hide')
      captionEl.textContent = isPopup ? 'Tap orb to talk' : captionEl.textContent
      starting = false
    }

    function setStarting() {
      document.body.className = 'starting' + (isPopup ? '' : ' full-page')
      captionEl.classList.remove('hide')
      captionEl.textContent = 'Connecting…'
    }

    function setActive() {
      document.body.className = 'active' + (isPopup ? '' : ' full-page')
      captionEl.classList.remove('hide')
      captionEl.textContent = 'Listening — tap to stop'
    }

    async function hardStop() {
      try {
        if (pc) { try { pc.close() } catch (e) {} pc = null }
        if (localStream) {
          try { localStream.getTracks().forEach(t => t.stop()) } catch (e) {}
          localStream = null
        }
      } finally {
        setIdle()
      }
    }

    document.getElementById('closeBtn').addEventListener('click', () => {
      hardStop()
      try { window.close() } catch (e) {}
    })

    orbContainer.addEventListener('click', toggleAssistant)
    orbContainer.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault()
        toggleAssistant()
      }
    })

    async function toggleAssistant() {
      if (pc || starting) {
        await hardStop()
        return
      }

      starting = true
      setStarting()

      try {
        const r = await fetch(sessionUrl)
        const data = await r.json()
        if (!r.ok || data.error) throw new Error(data.error || 'Could not start session')

        pc = new RTCPeerConnection()
        const audio = document.createElement('audio')
        audio.autoplay = true
        pc.ontrack = (e) => {
          if (audio.srcObject !== e.streams[0]) audio.srcObject = e.streams[0]
        }

        localStream = await navigator.mediaDevices.getUserMedia({ audio: true })
        pc.addTrack(localStream.getTracks()[0])

        const offer = await pc.createOffer()
        await pc.setLocalDescription(offer)

        const model = data.model || 'gpt-4o-realtime-preview-2024-12-17'
        const sdpResponse = await fetch(
          'https://api.openai.com/v1/realtime?model=' + encodeURIComponent(model),
          {
            method: 'POST',
            body: offer.sdp,
            headers: {
              Authorization: 'Bearer ' + data.client_secret.value,
              'Content-Type': 'application/sdp'
            }
          }
        )

        if (!sdpResponse.ok) throw new Error('Realtime connection failed')

        await pc.setRemoteDescription({ type: 'answer', sdp: await sdpResponse.text() })
        setActive()
      } catch (err) {
        console.error(err)
        pc = null
        if (localStream) {
          try { localStream.getTracks().forEach(t => t.stop()) } catch (e) {}
          localStream = null
        }
        document.body.className = isPopup ? '' : 'full-page'
        captionEl.textContent = 'Tap orb to retry'
        starting = false
      }
    }

    setIdle()
  </script>
</body>
</html>
