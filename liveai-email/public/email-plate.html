<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Axon AI</title>
  <style>
    :root { --yellow: #FED100; --yellow-deep: #D9AF00; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      user-select: none;
    }

    /* Popup over Gmail: light shade edge-to-edge, Gmail still visible */
    body.plate-mode {
      background: transparent;
    }

    body.plate-mode #shade {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.28);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* Direct visit (not popup): darker page */
    body.full-page {
      background: radial-gradient(circle, #2a2a2a 0%, #000 100%);
    }

    body.full-page #shade {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .close-plate {
      position: fixed;
      top: 10px;
      right: 12px;
      z-index: 20;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 900;
      cursor: pointer;
      line-height: 1;
    }

    /* Solid orb — logo sits inside */
    #orb-container {
      position: relative;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      background: radial-gradient(circle at 35% 30%, #FFF2A6 0%, var(--yellow) 45%, var(--yellow-deep) 100%);
      box-shadow:
        0 0 50px rgba(254, 209, 0, 0.85),
        0 0 100px rgba(254, 209, 0, 0.45);
      animation: orbPulse 1.4s ease-in-out infinite alternate;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid rgba(255, 255, 255, 0.35);
    }

    @keyframes orbPulse {
      from {
        transform: scale(1);
        box-shadow: 0 0 45px rgba(254, 209, 0, 0.75), 0 0 90px rgba(254, 209, 0, 0.35);
      }
      to {
        transform: scale(1.04);
        box-shadow: 0 0 70px rgba(254, 209, 0, 1), 0 0 130px rgba(254, 209, 0, 0.55);
      }
    }

    body.active #orb-container {
      animation: orbPulseActive 0.9s ease-in-out infinite alternate;
      border-color: #fff;
    }

    @keyframes orbPulseActive {
      from { transform: scale(1.02); }
      to   { transform: scale(1.07); }
    }

    #orb-container .logo {
      width: 68%;
      height: 68%;
      object-fit: contain;
      pointer-events: none;
      border-radius: 4px;
    }

    #orb-container .logo-fallback {
      font-size: 2.4rem;
      font-weight: 900;
      color: #1a1a1a;
      letter-spacing: -0.02em;
      pointer-events: none;
    }

    .caption {
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 0 1px 8px rgba(0,0,0,0.9);
      max-width: 220px;
      line-height: 1.4;
      pointer-events: none;
    }

    body.starting #orb-container { pointer-events: none; opacity: 0.92; }
  </style>
</head>
<body>
  <button type="button" class="close-plate" id="closeBtn" title="Close" aria-label="Close">✕</button>
  <div id="shade">
    <div id="orb-container" role="button" tabindex="0" aria-label="Talk with Axon AI">
      <img class="logo" id="logoImg" src="" alt="" hidden />
      <span class="logo-fallback" id="logoFallback">A1</span>
    </div>
    <p class="caption" id="caption">Tap orb to talk</p>
  </div>

  <script>
    let pc = null
    let localStream = null
    let starting = false

    const urlParams = new URLSearchParams(window.location.search)
    const isEmailContext = urlParams.get('src') === 'email'
    const isPopup = urlParams.get('popup') === '1' || window.name === 'axon_plate'
    const sessionUrl = isEmailContext ? '/session?src=email' : '/session'
    const biz = urlParams.get('biz') || 'A1 Professional Asphalt & Sealing'
    const logoUrl = urlParams.get('logo') || '/email/a1-logo.jpg'

    const captionEl = document.getElementById('caption')
    const orbContainer = document.getElementById('orb-container')
    const logoImg = document.getElementById('logoImg')
    const logoFallback = document.getElementById('logoFallback')

    if (isPopup) {
      document.body.classList.add('plate-mode')
    } else {
      document.body.classList.add('full-page')
      captionEl.textContent = 'Hello — AI team member with ' + biz + '. Tap orb to talk.'
    }

    logoImg.src = logoUrl
    logoImg.onload = function () {
      logoImg.hidden = false
      logoFallback.hidden = true
    }
    logoImg.onerror = function () {
      logoImg.hidden = true
      logoFallback.hidden = false
      logoFallback.textContent = (biz.match(/\bA1\b/i) ? 'A1' : biz.charAt(0).toUpperCase())
    }
    if (logoUrl) logoImg.src = logoUrl

    function setIdle() {
      document.body.classList.remove('active', 'starting')
      if (!isPopup) document.body.classList.add('full-page')
      if (isPopup) document.body.classList.add('plate-mode')
      captionEl.textContent = isPopup ? 'Tap orb to talk' : ('Hello — AI team member with ' + biz + '. Tap orb to talk.')
      starting = false
    }

    function setStarting() {
      document.body.classList.add('starting')
      document.body.classList.remove('active')
      captionEl.textContent = 'Connecting… allow microphone'
    }

    function setActive() {
      document.body.classList.add('active')
      document.body.classList.remove('starting')
      captionEl.textContent = 'Listening — tap orb to stop'
    }

    async function hardStop() {
      try {
        if (pc) { try { pc.close() } catch (e) {} pc = null }
        if (localStream) {
          try { localStream.getTracks().forEach(t => t.stop()) } catch (e) {}
          localStream = null
        }
      } finally {
        setIdle()
      }
    }

    document.getElementById('closeBtn').addEventListener('click', () => {
      hardStop()
      try { window.close() } catch (e) {}
    })

    document.getElementById('shade').addEventListener('click', async (e) => {
      if (e.target.id !== 'shade') return
      await hardStop()
      try { window.close() } catch (e) {}
    })

    orbContainer.addEventListener('click', (e) => {
      e.stopPropagation()
      toggleAssistant()
    })
    orbContainer.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault()
        toggleAssistant()
      }
    })

    async function toggleAssistant() {
      if (pc || starting) {
        await hardStop()
        return
      }

      starting = true
      setStarting()

      try {
        const r = await fetch(sessionUrl)
        const data = await r.json()
        if (!r.ok || data.error) throw new Error(data.error || 'Could not start session')

        pc = new RTCPeerConnection()
        const audio = document.createElement('audio')
        audio.autoplay = true
        pc.ontrack = (e) => {
          if (audio.srcObject !== e.streams[0]) audio.srcObject = e.streams[0]
        }

        localStream = await navigator.mediaDevices.getUserMedia({ audio: true })
        pc.addTrack(localStream.getTracks()[0])

        const offer = await pc.createOffer()
        await pc.setLocalDescription(offer)

        const model = data.model || 'gpt-4o-realtime-preview-2024-12-17'
        const sdpResponse = await fetch(
          'https://api.openai.com/v1/realtime?model=' + encodeURIComponent(model),
          {
            method: 'POST',
            body: offer.sdp,
            headers: {
              Authorization: 'Bearer ' + data.client_secret.value,
              'Content-Type': 'application/sdp'
            }
          }
        )

        if (!sdpResponse.ok) throw new Error('Realtime connection failed')

        await pc.setRemoteDescription({ type: 'answer', sdp: await sdpResponse.text() })
        setActive()
      } catch (err) {
        console.error(err)
        pc = null
        if (localStream) {
          try { localStream.getTracks().forEach(t => t.stop()) } catch (e) {}
          localStream = null
        }
        captionEl.textContent = 'Tap orb to try again'
        starting = false
        document.body.classList.remove('active', 'starting')
      }
    }

    setIdle()
  </script>
</body>
</html>
