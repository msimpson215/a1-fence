<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live AI Dash Email — Axon AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f6f8fc;
      color: #202124;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 12px;
      padding: 32px 28px;
      text-align: center;
    }
    h1 { font-size: 1.15rem; margin-bottom: 8px; }
    p { font-size: 14px; color: #5f6368; line-height: 1.55; margin-bottom: 20px; }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 8px;
      background: #FED100;
      color: #111;
      font-weight: 700;
      font-size: 13px;
      text-decoration: none;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
    }
    .foot { margin-top: 16px; font-size: 11px; color: #80868b; }
  </style>
  <script src="/assets/axon-email-orb.js"></script>
</head>
<body>
  <div class="card">
    <h1>Live AI Dash Email</h1>
    <p>Solid yellow orb with your logo. Light shade around it — Gmail still visible behind.</p>
    <button class="btn" id="openPlate" type="button">See it like Gmail (open plate)</button>
    <a class="btn" href="/mailer.html" style="background:#fff;border:2px solid #FED100;color:#111;">Preview email mailer</a>
    <p class="foot">Powered by Axon AI · A1 Professional Asphalt</p>
  </div>
  <script>
    document.getElementById('openPlate').addEventListener('click', function () {
      if (!AxonEmailOrb.openEmailOrb({ src: 'email', biz: 'A1 Professional Asphalt & Sealing' })) {
        alert('Allow popups, then try again.');
      }
    });
  </script>
</body>
</html>
