<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live AI Dash Email — Axon AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f6f8fc;
      color: #202124;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 12px;
      padding: 32px 28px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    h1 { font-size: 1.15rem; margin-bottom: 8px; }
    p { font-size: 14px; color: #5f6368; line-height: 1.55; margin-bottom: 20px; }
    .orb-btn {
      display: inline-block;
      cursor: pointer;
      margin-bottom: 16px;
      line-height: 0;
    }
    .orb-btn img {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(254, 209, 0, 0.6);
    }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 8px;
      background: #FED100;
      color: #111;
      font-weight: 700;
      font-size: 13px;
      text-decoration: none;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
    }
    .foot { margin-top: 16px; font-size: 11px; color: #80868b; }
  </style>
  <script src="/assets/axon-email-orb.js"></script>
</head>
<body>
  <div class="card">
    <h1>Live AI Dash Email</h1>
    <p>Gmail is the table. The orb is a tiny plate on top — you still see your inbox behind it.</p>
    <div class="orb-btn" id="tryOrb" role="button" tabindex="0">
      <img src="/email/orb-pulse.gif" width="160" height="160" alt="Axon AI orb" />
    </div>
    <button class="btn" id="openPlate" type="button">Try the plate (like Gmail)</button>
    <a class="btn" href="/mailer.html" style="background:#fff;border:2px solid #FED100;color:#111;">Preview email mailer</a>
    <p class="foot">Powered by Axon AI · A1 Professional Asphalt</p>
  </div>
  <script>
    function openPlate() {
      if (!AxonEmailOrb.openEmailOrb({ src: 'email' })) {
        alert('Allow popups, then try again.');
      }
    }
    document.getElementById('openPlate').addEventListener('click', openPlate);
    document.getElementById('tryOrb').addEventListener('click', openPlate);
  </script>
</body>
</html>
