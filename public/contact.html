<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact & Free Estimate | A1 Professional Asphalt & Sealing LLC</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>

<style>
/* KEEPING YOUR ORIGINAL STYLES */
:root{--yellow:#F5C518;--black:#0A0A0A;--dark:#111111;--gray:#1E1E1E;--text:#FFFFFF;--muted:rgba(255,255,255,0.55);}
body{background:var(--black);color:var(--text);font-family:'Barlow',sans-serif;}
.form-wrap{background:#1a1a1a;padding:48px;border-top:3px solid var(--yellow);}
.btn-submit{width:100%;background:var(--yellow);color:var(--black);padding:18px;border:none;font-weight:900;cursor:pointer;}
</style>

</head>

<body>

<h1>Request a Free Estimate</h1>

<input placeholder="First Name">
<input placeholder="Last Name">
<input placeholder="Phone">
<input placeholder="Email">
<textarea placeholder="Project Details"></textarea>

<button class="btn-submit">Request My Free Estimate →</button>

<!-- ✅ VIDEO UPLOAD SECTION INSERTED -->

<hr style="margin:40px 0; border:0; border-top:1px solid rgba(255,255,255,0.1);">

<div style="text-align:center; margin-top:20px;">

  <h3 style="font-family:'Bebas Neue',sans-serif; font-size:1.6rem; margin-bottom:10px;">
    Or Get a Fast Video Estimate
  </h3>

  <p style="color:#ffffff; margin-bottom:20px;">
    Walk your lot with one of our estimators on the phone, record a short video,
    upload it here, and receive a detailed estimate within about an hour.
    <br><br>
    <strong style="color:#F5C518;">Save 10% using this method.</strong>
  </p>

  <form id="uploadForm">
    <input type="file" name="video" accept="video/mp4"
      style="margin-bottom:15px; padding:12px; width:100%; max-width:400px; background:#242424; border:1px solid rgba(255,255,255,0.12); color:#fff;">

```
<br>

<button style="
  background:#F5C518;
  color:#000;
  padding:16px 24px;
  border:none;
  font-weight:900;
  letter-spacing:0.1em;
  text-transform:uppercase;
  cursor:pointer;
">
  Upload Video
</button>
```

  </form>

  <p id="status" style="margin-top:15px;"></p>

</div>

<!-- ✅ SCRIPT INSERTED -->

<script>
document.getElementById('uploadForm').addEventListener('submit', async (e) => {
  e.preventDefault()

  const fileInput = document.querySelector('input[name="video"]')
  const formData = new FormData()
  formData.append('video', fileInput.files[0])

  document.getElementById('status').innerText = "Uploading..."

  const res = await fetch("https://a1-asphalt-voxtalk-3.onrender.com/upload", {
    method: 'POST',
    body: formData
  })

  document.getElementById('status').innerText =
    res.ok ? "Video uploaded. Processing..." : "Upload failed"
})
</script>

</body>
</html>
