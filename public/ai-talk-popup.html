<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Talk with our AI team member</title>
<style>
:root{--yellow:#F5C518;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:transparent;overflow:hidden;height:100%;font-family:Arial,Helvetica,sans-serif;}
.shell{position:relative;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;}
.close-btn{position:fixed;top:8px;right:10px;z-index:20;width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);background:rgba(0,0,0,0.55);color:#fff;font-size:1.1rem;font-weight:900;cursor:pointer;line-height:1;}
.close-btn:hover{border-color:var(--yellow);color:var(--yellow);}
.orb{width:200px;height:200px;border-radius:50%;background:var(--orb-logo,#111) center/70% no-repeat;background-color:#111;border:3px solid var(--yellow);box-shadow:0 0 60px rgba(245,197,24,0.45),0 0 120px rgba(245,197,24,0.18);animation:pulse 3s ease-in-out infinite;cursor:pointer;margin-bottom:14px;}
@keyframes pulse{0%,100%{transform:scale(1);border-color:var(--yellow);}50%{transform:scale(1.04);border-color:#fff;}}
.greeting{color:#fff;font-size:0.95rem;line-height:1.5;text-align:center;max-width:320px;margin-bottom:8px;text-shadow:0 2px 12px rgba(0,0,0,0.9);}
.greeting strong{color:var(--yellow);}
.tagline{color:rgba(255,255,255,0.85);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.12em;text-align:center;margin-bottom:14px;text-shadow:0 2px 10px rgba(0,0,0,0.9);}
.cta{color:var(--yellow);font-size:0.82rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;text-align:center;text-shadow:0 2px 10px rgba(0,0,0,0.9);}
.cta:hover{text-decoration:underline;}
.powered{position:fixed;bottom:8px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.55);font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;text-shadow:0 1px 8px rgba(0,0,0,0.8);}
.chat{display:none;position:fixed;inset:0;border:none;background:#0a0a0a;}
.chat.active{display:block;}
#intro{display:flex;flex-direction:column;align-items:center;}
</style>
</head>
<body>
<button type="button" class="close-btn" id="closeBtn" title="Close" aria-label="Close">✕</button>
<div class="shell" id="shell">
  <div id="intro">
    <div class="orb" id="orb" role="button" tabindex="0" aria-label="Start conversation"></div>
    <p class="greeting" id="greeting"></p>
    <p class="tagline" id="tagline"></p>
    <p class="cta" id="startCta">Press to talk with our AI</p>
  </div>
</div>
<iframe id="chat" class="chat" title="AI conversation" allow="microphone"></iframe>
<p class="powered">Powered by Axon AI</p>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var biz = params.get('biz') || 'A1 Professional Fence';
  var tagline = params.get('tagline') || 'Professional fencing — St. Louis & nationwide';
  var logo = params.get('logo') || 'A1_fence_logo.jpg';
  var chatUrl = params.get('chat') || 'https://a1-asphalt-voxtalk-3.onrender.com/';

  document.getElementById('greeting').innerHTML =
    'Hello. I&rsquo;m an <strong>AI team member</strong> with <strong>' + escapeHtml(biz) + '</strong>.';
  document.getElementById('tagline').textContent = tagline;
  document.getElementById('orb').style.setProperty('--orb-logo', "url('" + logo.replace(/'/g, '') + "')");

  var chatFrame = document.getElementById('chat');
  chatFrame.src = chatUrl;

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function startChat() {
    document.getElementById('intro').style.display = 'none';
    chatFrame.classList.add('active');
  }

  function closeOrb() {
    if (chatFrame.classList.contains('active')) {
      chatFrame.classList.remove('active');
      document.getElementById('intro').style.display = 'flex';
      return;
    }
    window.close();
  }

  document.getElementById('orb').addEventListener('click', startChat);
  document.getElementById('startCta').addEventListener('click', startChat);
  document.getElementById('closeBtn').addEventListener('click', closeOrb);
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeOrb();
  });

  if (params.get('autostart') === '1') startChat();
})();
</script>
</body>
</html>
