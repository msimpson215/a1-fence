<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A1 Team Member</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;overflow:hidden;height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;font-family:'Arial',sans-serif;}
.orb{width:220px;height:220px;border-radius:50%;background:url('A1__asphalt_logo.jpeg') center/70% no-repeat;background-color:#111;border:3px solid #F5C518;box-shadow:0 0 60px rgba(245,197,24,0.4),0 0 120px rgba(245,197,24,0.15),0 0 200px rgba(245,197,24,0.08);animation:pulse 3s ease-in-out infinite;cursor:pointer;margin-bottom:16px;}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 60px rgba(245,197,24,0.4),0 0 120px rgba(245,197,24,0.15);border-color:#F5C518;}50%{transform:scale(1.05);box-shadow:0 0 80px rgba(245,197,24,0.6),0 0 160px rgba(245,197,24,0.25);border-color:#fff;}}
.label{color:#F5C518;font-size:0.9rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;}
.chat{display:none;width:100%;height:100%;border:none;}
</style>
</head>
<body>
<div id="orbWrap" onclick="startChat()">
  <div class="orb"></div>
  <div class="label">Click to Start</div>
</div>
<iframe id="chat" class="chat" src="https://a1-asphalt-voxtalk-3.onrender.com/" allow="microphone"></iframe>
<script>
function startChat(){
  document.getElementById('orbWrap').style.display='none';
  var c=document.getElementById('chat');
  c.style.display='block';
  c.style.width='100%';
  c.style.height='100vh';
}
</script>
</body>
</html>
