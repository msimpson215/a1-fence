<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Opening AI conversation…</title>
<style>
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0a;color:#fff;font-family:Arial,sans-serif;text-align:center;padding:24px;}
.box{max-width:400px;}
h1{font-size:1.1rem;color:#F5C518;margin-bottom:12px;}
p{color:#aaa;font-size:0.9rem;margin-bottom:20px;line-height:1.5;}
a{color:#F5C518;font-weight:800;}
.btn{display:inline-block;padding:14px 32px;background:#F5C518;color:#000;text-decoration:none;font-weight:900;text-transform:uppercase;letter-spacing:0.08em;border-radius:8px;font-size:0.85rem;}
</style>
</head>
<body>
<div class="box">
  <h1>Axon AI</h1>
  <p id="msg">Opening your conversation window…</p>
  <a class="btn" id="manual" href="#" style="display:none;">Open AI orb</a>
  <p style="margin-top:24px;font-size:0.7rem;color:#555;">Powered by Axon AI · Runs outside Gmail</p>
</div>
<script src="assets/axon-email-orb.js"></script>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var orbParams = {
    biz: params.get('biz') || undefined,
    tagline: params.get('tagline') || undefined,
    logo: params.get('logo') || undefined,
    chat: params.get('chat') || undefined
  };
  Object.keys(orbParams).forEach(function (k) {
    if (!orbParams[k]) delete orbParams[k];
  });

  var popup = AxonEmailOrb.openEmailOrb(orbParams);
  if (popup) {
    document.getElementById('msg').textContent =
      'If you still see Gmail behind a small window, you’re set. Close this tab or return to your email.';
    try { window.close(); } catch (e) {}
  } else {
    document.getElementById('msg').textContent =
      'Your browser blocked the popup. Click below — for the floating-over-Gmail effect, allow popups for this site.';
    var manual = document.getElementById('manual');
    manual.style.display = 'inline-block';
    manual.href = '#';
    manual.addEventListener('click', function (e) {
      e.preventDefault();
      AxonEmailOrb.openEmailOrb(orbParams);
    });
  }
})();
</script>
</body>
</html>
