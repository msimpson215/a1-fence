<style>
  /* === RESET & BASE === */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* === HERO WRAPPER === */
  .a1-hero {
    position: relative;
    width: 100%;
    min-height: 100vh;
    background-color: #0a0c0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    font-family: 'Oswald', 'Impact', sans-serif;
  }

  /* === BACKGROUND FLAGS (left + right, faded) === */
  .a1-flag-left,
  .a1-flag-right {
    position: absolute;
    top: 0;
    width: 42%;
    height: 100%;
    background-image: url('https://upload.wikimedia.org/wikipedia/en/a/a4/Flag_of_the_United_States.svg');
    background-size: cover;
    background-position: center;
    opacity: 0.07;
    pointer-events: none;
    z-index: 0;
  }
  .a1-flag-left  { left: 0;  transform: scaleX(-1); }
  .a1-flag-right { right: 0; }

  /* Dark gradient overlay so center stays readable */
  .a1-hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 80% at 50% 50%, transparent 30%, #0a0c0f 80%);
    z-index: 1;
    pointer-events: none;
  }

  /* === NAV BAR === */
  .a1-nav {
    position: relative;
    z-index: 10;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: rgba(10,12,15,0.75);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  .a1-nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }

  .a1-nav-links a {
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-family: 'Oswald', 'Impact', sans-serif;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .a1-nav-links a:hover { color: #c9a84c; }

  .a1-nav-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .a1-btn-ai {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.6);
    color: #c9a84c;
    padding: 8px 18px;
    font-family: 'Oswald', 'Impact', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .a1-btn-ai:hover {
    background: #c9a84c;
    color: #0a0c0f;
  }

  .a1-btn-phone {
    background: #c9a84c;
    border: 1px solid #c9a84c;
    color: #0a0c0f;
    padding: 8px 20px;
    font-family: 'Oswald', 'Impact', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
  }
  .a1-btn-phone:hover { opacity: 0.85; }

  /* === CENTER LOGO BAND === */
  .a1-logo-band {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    padding: 60px 20px 20px;
    text-align: center;
  }

  .a1-logo-wrap {
    margin-bottom: 32px;
  }

  .a1-logo-wrap img {
    max-width: 420px;
    width: 90vw;
    height: auto;
    display: block;
    /* subtle gold glow to lift logo off dark bg */
    filter: drop-shadow(0 0 28px rgba(201,168,76,0.25));
  }

  /* === THIN GOLD DIVIDER === */
  .a1-divider {
    width: 80px;
    height: 2px;
    background: #c9a84c;
    margin: 0 auto 28px;
  }

  /* === HERO TEXT === */
  .a1-location {
    font-family: 'Oswald', 'Impact', sans-serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #c9a84c;
    margin-bottom: 16px;
  }

  .a1-headline {
    font-family: 'Oswald', 'Impact', sans-serif;
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 700;
    line-height: 1.05;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #ffffff;
    margin-bottom: 36px;
  }

  .a1-cta-group {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .a1-cta-primary {
    background: #c9a84c;
    color: #0a0c0f;
    padding: 14px 36px;
    font-family: 'Oswald', 'Impact', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .a1-cta-primary:hover { opacity: 0.85; }

  .a1-cta-secondary {
    background: transparent;
    color: rgba(255,255,255,0.8);
    padding: 14px 36px;
    font-family: 'Oswald', 'Impact', sans-serif;
    font-size: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.3);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .a1-cta-secondary:hover {
    border-color: #c9a84c;
    color: #c9a84c;
  }

  /* === BOTTOM TRUST BAR === */
  .a1-trust-bar {
    position: relative;
    z-index: 10;
    width: 100%;
    background: rgba(201,168,76,0.08);
    border-top: 1px solid rgba(201,168,76,0.2);
    display: flex;
    justify-content: center;
    gap: 48px;
    flex-wrap: wrap;
    padding: 18px 40px;
  }

  .a1-trust-item {
    color: rgba(255,255,255,0.6);
    font-family: 'Oswald', 'Impact', sans-serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .a1-trust-item strong {
    color: #c9a84c;
    margin-right: 6px;
  }

  /* === RESPONSIVE === */
  @media (max-width: 768px) {
    .a1-nav { padding: 14px 20px; }
    .a1-nav-links { gap: 18px; }
    .a1-nav-links a { font-size: 11px; }
    .a1-btn-ai { display: none; }
    .a1-trust-bar { gap: 24px; }
  }
  @media (max-width: 480px) {
    .a1-nav-links { display: none; }
  }
</style>
