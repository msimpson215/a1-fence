<!-- ============================================================
     A1 PROFESSIONAL ASPHALT — HERO SECTION
     Drop-in replacement — keeps all original class names
     ============================================================ -->

<!-- Google Font: Bebas Neue (already used on site) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600&display=swap" rel="stylesheet">

<style>
/* ============================================================
   HERO SECTION — FULL REWRITE
   ============================================================ */

/* === WRAPPER === */
.hero-wrapper {
  position: relative;
  min-height: 100vh;
  background:
    linear-gradient(rgba(0,0,0,.70), rgba(0,0,0,.80)),
    url('/images/stlouis-background.jpg') center / cover no-repeat;
  overflow: hidden;
  color: white;
  font-family: 'Bebas Neue', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ============================================================
   BACKGROUND FLAGS — texture only, never the focus
   ============================================================ */
.flag {
  position: absolute;
  top: 0;
  width: 38%;
  height: 100%;
  background-image: url('/images/american-flag.png');
  background-size: cover;
  background-position: center;
  opacity: 0.09;
  pointer-events: none;
  z-index: 0;
}

.flag-left  { left: 0; }
.flag-right { right: 0; transform: scaleX(-1); }

/* Radial vignette crushes flags in the center — logo stays clean */
.hero-wrapper::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 65% 70% at 50% 45%, transparent 20%, rgba(0,0,0,0.75) 75%);
  z-index: 1;
  pointer-events: none;
}

/* ============================================================
   NAV BAR
   ============================================================ */
.top-nav {
  position: relative;
  z-index: 20;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 48px;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 32px;
}

.nav-left a {
  color: rgba(255,255,255,0.78);
  text-decoration: none;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.05rem;
  letter-spacing: 0.14em;
  transition: color 0.2s;
}
.nav-left a:hover { color: #d4a017; }

.nav-right {
  display: flex;
  align-items: center;
  gap: 14px;
}

/* AI button — gold outline */
.ai-btn {
  color: #d4a017 !important;
  border: 1.5px solid #d4a017;
  padding: 10px 20px;
  border-radius: 4px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.95rem;
  letter-spacing: 0.1em;
  text-decoration: none;
  transition: background 0.2s, color 0.2s;
  white-space: nowrap;
}
.ai-btn:hover {
  background: #d4a017;
  color: #0a0c0f !important;
}

/* Phone button — solid white, black text */
.phone-btn {
  background: #ffffff;
  color: #111111 !important;
  padding: 10px 22px;
  border-radius: 4px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-decoration: none;
  white-space: nowrap;
  transition: opacity 0.2s;
}
.phone-btn:hover { opacity: 0.88; }

/* ============================================================
   LARGE CENTER LOGO — the hero, the boss, the whole point
   ============================================================ */
.main-logo-wrap {
  position: relative;
  z-index: 10;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 52px;
  margin-bottom: 12px;
}

.main-logo {
  width: min(820px, 82vw);
  height: auto;
  display: block;
  filter: drop-shadow(0 6px 32px rgba(212,160,23,0.22)) drop-shadow(0 2px 8px rgba(0,0,0,0.7));
}

/* Gold accent line under logo */
.main-logo-wrap::after {
  content: '';
  position: absolute;
  bottom: -18px;
  left: 50%;
  transform: translateX(-50%);
  width: 72px;
  height: 2px;
  background: #d4a017;
}

/* ============================================================
   HERO TEXT
   ============================================================ */
.hero-content {
  position: relative;
  z-index: 10;
  text-align: center;
  margin-top: 44px;
  padding: 0 24px 100px;
}

.hero-location {
  color: #d4a017;
  font-family: 'Oswald', sans-serif;
  font-size: 0.85rem;
  font-weight: 400;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  margin-bottom: 18px;
}

.hero-content h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3.6rem, 9vw, 7.5rem);
  line-height: 0.94;
  letter-spacing: 0.03em;
  color: #ffffff;
  margin: 0 0 40px;
}

/* CTA buttons below headline */
.hero-cta-group {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

.hero-cta-primary {
  background: #d4a017;
  color: #0a0c0f;
  padding: 14px 38px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.15rem;
  letter-spacing: 0.12em;
  text-decoration: none;
  border: none;
  border-radius: 3px;
  transition: opacity 0.2s;
}
.hero-cta-primary:hover { opacity: 0.85; }

.hero-cta-secondary {
  background: transparent;
  color: rgba(255,255,255,0.82);
  padding: 14px 38px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.15rem;
  letter-spacing: 0.12em;
  text-decoration: none;
  border: 1.5px solid rgba(255,255,255,0.32);
  border-radius: 3px;
  transition: border-color 0.2s, color 0.2s;
}
.hero-cta-secondary:hover {
  border-color: #d4a017;
  color: #d4a017;
}

/* ============================================================
   BOTTOM TRUST BAR
   ============================================================ */
.hero-trust-bar {
  position: relative;
  z-index: 10;
  width: 100%;
  margin-top: auto;
  background: rgba(212,160,23,0.07);
  border-top: 1px solid rgba(212,160,23,0.22);
  display: flex;
  justify-content: center;
  gap: 48px;
  flex-wrap: wrap;
  padding: 16px 40px;
}

.hero-trust-bar span {
  font-family: 'Oswald', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
}
.hero-trust-bar strong {
  color: #d4a017;
  margin-right: 5px;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 900px) {
  .top-nav {
    flex-direction: column;
    gap: 16px;
    padding: 16px 24px;
  }
  .nav-left {
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
  }
  .main-logo { width: 88vw; }
  .hero-content h1 { font-size: 3.8rem; }
  .flag { width: 45%; opacity: 0.07; }
  .hero-trust-bar { gap: 24px; }
}

@media (max-width: 500px) {
  .ai-btn { display: none; }
  .hero-cta-group { flex-direction: column; align-items: center; }
  .flag { display: none; }
}
</style>

<!-- ============================================================
     HTML
     ============================================================ -->
<section class="hero-wrapper">

  <!-- Background flags — texture, not focus -->
  <div class="flag flag-left"></div>
  <div class="flag flag-right"></div>

  <!-- NAV -->
  <nav class="top-nav">
    <div class="nav-left">
      <a href="#">SERVICES</a>
      <a href="#">OUR WORK</a>
      <a href="#">ABOUT</a>
      <a href="#">CONTACT</a>
    </div>
    <div class="nav-right">
      <a class="ai-btn" href="#">TALK WITH OUR A.I. TEAM</a>
      <a class="phone-btn" href="tel:6189293301">(618) 929-3301</a>
    </div>
  </nav>

  <!-- BIG LOGO — first thing your eye hits -->
  <div class="main-logo-wrap">
    <img
      src="/images/A1__asphalt_logo.jpeg"
      alt="A1 Professional Asphalt"
      class="main-logo"
    >
  </div>

  <!-- HEADLINE + CTA -->
  <div class="hero-content">
    <p class="hero-location">St. Louis &amp; The Midwest</p>
    <h1>
      THE LAST<br>
      ASPHALT COMPANY<br>
      YOU'LL EVER CALL
    </h1>
    <div class="hero-cta-group">
      <a class="hero-cta-primary" href="tel:6189293301">CALL FOR A FREE ESTIMATE</a>
      <a class="hero-cta-secondary" href="#">VIEW OUR WORK</a>
    </div>
  </div>

  <!-- TRUST BAR -->
  <div class="hero-trust-bar">
    <span><strong>25+</strong> Years in Business</span>
    <span><strong>Licensed</strong> &amp; Insured</span>
    <span><strong>Free</strong> Estimates</span>
    <span><strong>Serving</strong> St. Louis &amp; The Midwest</span>
  </div>

</section>
