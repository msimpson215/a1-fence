<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Howard Tree Pros</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: system-ui, sans-serif; }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #1a2e1a url("ChatGPT%20Image%20May%2015,%202026,%2002_35_34%20PM.png") center / cover no-repeat fixed;
    }

    .overlay {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.25) 40%,
        rgba(0,0,0,0.45) 100%
      );
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.6rem 1.1rem;
      background: rgba(45, 106, 79, 0.9);
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 6px;
    }

    nav a:hover {
      background: rgba(64, 145, 108, 0.95);
    }

    .spacer { flex: 1; }

    footer {
      text-align: center;
      padding: 1.25rem;
      background: rgba(0,0,0,0.75);
      color: #e8e8e8;
      font-size: 0.9rem;
    }

    footer a {
      color: #95d5b2;
      font-weight: 800;
      font-size: 1.15rem;
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    footer p { margin-top: 0.35rem; opacity: 0.85; }
  </style>
</head>
<body>
  <div class="page">
    <div class="overlay">
      <nav aria-label="Main">
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </nav>
      <div class="spacer" id="home"></div>
      <footer id="contact">
        <a href="tel:+13145550100">(314) 555-0100</a>
        <p>Howard Tree Pros &mdash; tree removal, trimming &amp; cleanup</p>
      </footer>
    </div>
  </div>
</body>
</html>
